<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ThotBrain — Coder JSX Sandbox</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #e0e0e0; min-height: 100vh; }
.header { background: linear-gradient(135deg, #1a1a2e, #16213e); padding: 20px 30px; border-bottom: 1px solid #333; display: flex; align-items: center; gap: 15px; }
.header h1 { font-size: 1.4em; color: #f0c040; }
.header span { color: #888; font-size: 0.9em; }
.container { max-width: 1400px; margin: 0 auto; padding: 20px; display: grid; grid-template-columns: 400px 1fr; gap: 20px; height: calc(100vh - 80px); }
.panel { background: #141414; border: 1px solid #2a2a2a; border-radius: 12px; padding: 20px; overflow-y: auto; }
.panel h2 { color: #f0c040; margin-bottom: 15px; font-size: 1.1em; }
textarea { width: 100%; height: 150px; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; color: #ddd; padding: 12px; font-size: 14px; resize: vertical; font-family: inherit; }
textarea:focus { outline: none; border-color: #f0c040; }
.btn { background: linear-gradient(135deg, #f0c040, #e6a020); color: #000; border: none; padding: 12px 24px; border-radius: 8px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 10px; font-size: 15px; transition: all 0.2s; }
.btn:hover { transform: translateY(-1px); box-shadow: 0 4px 15px rgba(240,192,64,0.3); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.status { margin-top: 15px; padding: 10px; background: #1a1a1a; border-radius: 8px; font-size: 13px; color: #888; min-height: 40px; }
.status.ok { color: #4caf50; }
.status.err { color: #f44336; }
.status.working { color: #f0c040; }
.code-preview { margin-top: 15px; }
.code-preview pre { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 12px; font-size: 11px; max-height: 300px; overflow: auto; color: #aaa; white-space: pre-wrap; word-break: break-all; }
#render-frame { width: 100%; height: 100%; border: none; border-radius: 8px; background: #1a1a2e; }
.timer { color: #f0c040; font-weight: 600; }
</style>
</head>
<body>
<div class="header">
  <h1>⚡ ThotBrain Coder Sandbox</h1>
  <span>Qwen3-Coder-30B → JSX → React Live Render</span>
</div>
<div class="container">
  <div class="panel">
    <h2>📝 Input</h2>
    <textarea id="topic" placeholder="Escribe un tema o síntesis para visualizar...">Análisis del mercado de chips de IA en 2026: NVIDIA domina con 78% de cuota de mercado (H200, B200). AMD tiene 15% con MI350. Intel con Gaudi3 tiene 4%. El mercado total es de $180B, crecimiento del 35% anual. China con Huawei Ascend tiene 3%. TSMC fabrica el 92% de los chips avanzados.</textarea>
    <button class="btn" id="generate" onclick="generateJSX()">🚀 Generar Visualización JSX</button>
    <div class="status" id="status">Listo. Coder en 100.64.0.29:8300</div>
    <div class="code-preview">
      <h2 style="margin-top:10px">📄 JSX Generado</h2>
      <pre id="code-output">Esperando...</pre>
    </div>
  </div>
  <div class="panel" style="padding:0; overflow:hidden;">
    <iframe id="render-frame"></iframe>
  </div>
</div>

<script>
const CODER_URL = '/api/coder/generate';
const SC = '<' + '/script>';

const JSX_SYSTEM = 'You are a React/JSX presentation expert. You receive data and must create a SINGLE React component called Presentation.\n\nCRITICAL RULES:\n1. Return ONLY valid JSX code - NO markdown, NO backticks, NO imports, NO exports\n2. The component MUST be: const Presentation = () => { ... return (...); };\n3. DO NOT use import or export statements\n4. DO NOT use window.Recharts - Recharts components are already available as globals\n5. Available as globals: BarChart, LineChart, PieChart, AreaChart, RadarChart, Bar, Line, Pie, Area, Radar, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, Cell, PolarGrid, PolarAngleAxis, PolarRadiusAxis\n6. Use inline styles ONLY (no CSS classes, no styled-components)\n7. Dark theme: background #1a1a2e, cards #16213e, text #e0e0e0, accents #f0c040, #4fc3f7, #66bb6a, #ef5350\n8. Make it visually impressive with charts AND data cards in a grid layout\n9. All data must be hardcoded from the synthesis provided\n10. Wrap ALL charts in <ResponsiveContainer width="100%" height={250}>';

async function generateJSX() {
  const topic = document.getElementById('topic').value;
  const btn = document.getElementById('generate');
  const status = document.getElementById('status');
  const codeOut = document.getElementById('code-output');

  btn.disabled = true;
  status.className = 'status working';
  status.innerHTML = '⏳ Enviando a Qwen3-Coder...';
  codeOut.textContent = 'Generando...';

  const t0 = performance.now();

  try {
    const resp = await fetch(CODER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages: [
          { role: 'system', content: JSX_SYSTEM },
          { role: 'user', content: 'Research synthesis to visualize:\n\n' + topic }
        ],
        max_tokens: 4096,
        temperature: 0.3
      })
    });

    const data = await resp.json();
    const elapsed = ((performance.now() - t0) / 1000).toFixed(1);

    if (data.error) {
      status.className = 'status err';
      status.innerHTML = '❌ Error: ' + data.error;
      btn.disabled = false;
      return;
    }

    var jsx = data.jsx || '';
    jsx = jsx.replace(/```jsx?\n?/g, '').replace(/```\n?/g, '').trim();

    status.className = 'status ok';
    status.innerHTML = '✅ JSX generado en <span class="timer">' + elapsed + 's<\/span> — ' + jsx.length + ' chars';
    codeOut.textContent = jsx;

    renderJSX(jsx);
  } catch (e) {
    status.className = 'status err';
    status.innerHTML = '❌ Error: ' + e.message;
  }

  btn.disabled = false;
}

function renderJSX(jsx) {
  var frame = document.getElementById('render-frame');

  // Clean JSX
  jsx = jsx.replace(/^import\s+.*?[;\n]/gm, '');
  jsx = jsx.replace(/^export\s+default\s+\w+;?\s*$/gm, '');
  jsx = jsx.replace(/```jsx?\n?/g, '').replace(/```\n?/g, '');
  jsx = jsx.replace(/const\s*\{[^}]*\}\s*=\s*window\.Recharts;?\s*/g, '');
  jsx = jsx.replace(/const\s*\{[^}]*\}\s*=\s*Recharts;?\s*/g, '');

  // Escape for embedding in a JS string inside the iframe
  var escapedJsx = jsx.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/\n/g, '\\n');

  // Build iframe HTML via string concat to avoid closing tag issues
  var h = '<!DOCTYPE html><html><head><meta charset="UTF-8">';
  h += '<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#1a1a2e;color:#e0e0e0;padding:20px;min-height:100vh}</style>';
  h += '</head><body>';
  h += '<div id="root"><div style="color:#888;padding:40px;text-align:center">Cargando librerias...</div></div>';
  h += '<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js">' + SC;
  h += '<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js">' + SC;
  h += '<script src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js">' + SC;
  h += '<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js">' + SC;
  h += '<script>';
  h += 'var s=document.createElement("script");';
  h += 's.src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js";';
  h += 's.onload=function(){';
  h += '  document.getElementById("root").innerHTML="<div style=\\"color:#888;padding:40px;text-align:center\\">Renderizando JSX...</div>";';
  h += '  if(window.Recharts){Object.keys(window.Recharts).forEach(function(k){window[k]=window.Recharts[k]})}';
  h += '  try{';
  h += '    var jsxCode="(function(){" + \'' + escapedJsx + '\' + "\\nreturn Presentation;})()";';
  h += '    var transformed=Babel.transform(jsxCode,{presets:["react"]}).code;';
  h += '    var Comp=eval(transformed);';
  h += '    var root=ReactDOM.createRoot(document.getElementById("root"));';
  h += '    root.render(React.createElement(Comp));';
  h += '  }catch(e){';
  h += '    document.getElementById("root").innerHTML="<div style=\\"color:#f44336;padding:20px\\"><h3>Render Error</h3><pre>"+e.message+"</pre><pre>"+e.stack+"</pre></div>"';
  h += '  }';
  h += '};';
  h += 's.onerror=function(){document.getElementById("root").innerHTML="<div style=\\"color:#f44336;padding:20px\\">Failed to load Recharts CDN</div>"};';
  h += 'document.head.appendChild(s);';
  h += SC;
  h += '</body></html>';

  frame.srcdoc = h;
}
</script>
</body>
</html>
